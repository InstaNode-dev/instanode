# Docker Compose configuration for instant-lite-api
# Mounted into the container at /app/config.yaml

server:
  port: "8080"
  base_url: "http://localhost:18080"
  read_timeout: "10s"
  write_timeout: "30s"
  idle_timeout: "60s"

database:
  platform_url: "postgres://instant:instant@postgres:5432/instant_lite?sslmode=disable"
  customer_url: "postgres://instant:instant@postgres:5432/instant_lite?sslmode=disable"
  max_open_conns: 20
  max_idle_conns: 5

redis:
  url: "redis://redis:6379"

limits:
  rate_requests_per_second: 10
  rate_burst: 20
  max_provisions_per_day: 5
  anon_ttl: "24h"
  max_request_body_bytes: 1048576
  webhook_max_body_bytes: 1048576
  webhook_max_stored: 100
  ipv4_cidr_prefix: 24
  ipv6_cidr_prefix: 48

reaper:
  interval: "5m"
  batch_size: 50
  timeout: "60s"

postgres:
  conn_limit: 2
  storage_mb: 10
  statement_timeout: "30s"
